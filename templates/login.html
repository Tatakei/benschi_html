<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benschi</title>
    <link href="/static/css/webDashboard.css" rel="stylesheet">
    <link rel="icon" type="image/png" href="/static/images/benschi.png">
</head>
<body id="top">
<!-- Enhanced Background Elements -->
<div class="cyber-bg">
    <div class="cyber-gradient"></div>
    <div class="matrix-rain" id="matrixRain"></div>
</div>

<div class="particles" id="particlesContainer"></div>

<div class="data-streams" id="dataStreams"></div>

<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<div class="grid-overlay">
    <div class="grid-lines"></div>
    <div class="grid-glow"></div>
</div>

<div class="scanlines"></div>
<div class="noise-overlay"></div>

<!-- Navigation -->
<nav>
    <div class="nav-container">
        <a href="#top" class="logo">Benschi</a>
    </div>
</nav>

<!-- Mobile Menu -->
<div class="mobile-menu-overlay" id="mobileMenuOverlay"></div>
<div class="mobile-menu" id="mobileMenu">
    <div class="mobile-menu-header">
        <a href="#top" class="mobile-menu-logo">Benschi</a>
        <button class="mobile-menu-close" id="mobileMenuClose">✕</button>
    </div>
    <!--
    <div class="mobile-menu-cta">
        <a href="#" class="cyber-button">Access Terminal</a>
    </div>
    -->
    <nav class="mobile-menu-nav">
        <ul>
            <li><a href="#atm10">ATM10</a></li>
            <li><a href="#todo">Todo</a></li>
            <li><a href="#stats">Stats</a></li>
        </ul>
    </nav>
</div>

<!-- Hero Section -->
<section class="hero" style="display: flex; flex-direction: column;">
    <div class="hero-container">
        <h1 class="hero-title">
            <span class="hero-nexus">Log</span><span class="hero-flow">in</span>
        </h1>
    </div>
    <div class="contact-container">
        <div class="section-header">
            <p class="section-subtitle">Please enter your Account Information.</p>
        </div>
        <div class="contact-form-wrapper">
            <div class="contact-form">
                <div class="form-group">
                    <label for="name">Username</label>
                    <input type="text" id="name" name="name" placeholder="John" autocomplete="off" required>
                </div>

                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" placeholder="john_doe@benschi.com" autocomplete="off" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="john!doe" autocomplete="off" required>
                </div>

                <button type="submit" id="loginBtn" class="btn-primary btn-submit">Login</button>
            </div>
        </div>
    </div>
</section>

<!-- Footer -->
<footer class="footer">
    <div class="footer-content">
        <div class="footer-bottom">
            <p>&copy; 2026 Benschi :3</p>
        </div>
    </div>
</footer>

<script src="/static/js/webDashboard.js"></script>
<script src="/static/js/login.js"></script>
</body>
</html>

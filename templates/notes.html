<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benschi</title>
    <link href="/static/css/webDashboard.css" rel="stylesheet">
    <link rel="icon" type="image/png" href="/static/images/benschi.png">
    <script src="/static/js/templates/web-nav.js" defer></script>
    <script src="/static/js/templates/web-hero.js" defer></script>
    <script src="/static/js/templates/web-footer.js" defer></script>
</head>
<body id="top">
<!-- Enhanced Background Elements -->
<div class="cyber-bg">
    <div class="cyber-gradient"></div>
    <div class="matrix-rain" id="matrixRain"></div>
</div>

<div class="particles" id="particlesContainer"></div>

<div class="data-streams" id="dataStreams"></div>

<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<div class="grid-overlay">
    <div class="grid-lines"></div>
    <div class="grid-glow"></div>
</div>

<div class="scanlines"></div>
<div class="noise-overlay"></div>

<!-- Navigation -->
<web-nav></web-nav>

<!-- Hero Section -->
<section class="hero" style="display: flex; flex-direction: column;">
    <div class="hero-container">
        <h1 class="hero-title">
            <span class="hero-nexus">Noti</span><span class="hero-flow">zen</span>
        </h1>
    </div>
    <div class="contact-container">
        <div class="contact-form-wrapper">
            <div class="contact-form">
                <div class="form-group">
                    <label for="notes-category">Kategorie</label>
                    <div class="cyber-toggle-group">
                        <input type="radio" id="notes-category-opt-1" name="notes-category" value="notes-category-opt-1" checked>
                        <label for="notes-category-opt-1">Notiz</label>

                        <input type="radio" id="notes-category-opt-2" name="notes-category" value="notes-category-opt-2">
                        <label for="notes-category-opt-2">Todo</label>

                        <input type="radio" id="notes-category-opt-3" name="notes-category" value="notes-category-opt-3">
                        <label for="notes-category-opt-3">Vorschlag</label>

                        <input type="radio" id="notes-category-opt-4" name="notes-category" value="notes-category-opt-4">
                        <label for="notes-category-opt-4">Glossar</label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="content"></label>
                    <input type="text" id="notes_content" name="content" placeholder="Content" autocomplete="off" required>
                </div>

                <div class="form-group">
                    <label for="uid">UID</label>
                    <input type="text" id="notes_uid" name="uid" placeholder="UID" value="123" disabled>
                </div>

                <button type="submit" id="loginBtn" class="btn-primary btn-submit" onclick="updateDB()">Erstellen</button>
            </div>
        </div>
    </div>
</section>

<!-- Footer -->
<web-footer></web-footer>

<script src="/static/js/webDashboard.js"></script>
<script src="/static/js/router.js"></script>
<script src="/static/js/notes_db.js"></script>
</body>
</html>

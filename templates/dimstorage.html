<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benschi</title>
    <link href="/static/css/webDashboard.css" rel="stylesheet">
    <link rel="icon" type="image/png" href="/static/images/benschi.png">
    <script src="/static/js/templates/web-nav.js" defer></script>
    <script src="/static/js/templates/web-hero.js" defer></script>
    <script src="/static/js/templates/web-footer.js" defer></script>
</head>
<body id="top">
<!-- Enhanced Background Elements -->
<div class="cyber-bg">
    <div class="cyber-gradient"></div>
    <div class="matrix-rain" id="matrixRain"></div>
</div>

<div class="particles" id="particlesContainer"></div>

<div class="data-streams" id="dataStreams"></div>

<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<div class="grid-overlay">
    <div class="grid-lines"></div>
    <div class="grid-glow"></div>
</div>

<div class="scanlines"></div>
<div class="noise-overlay"></div>

<!-- Navigation -->
<web-nav></web-nav>

<!-- Hero Section -->
<section id="hero" class="hero" style="display: flex; flex-direction: column;">
    <div class="hero-container">
        <h1 class="hero-title">
            <span class="hero-nexus">Dim</span><span class="hero-flow">storage</span>
        </h1>
    </div>
    <div class="contact-container">
        <div class="contact-form-wrapper">
            <div class="contact-form">
                <div class="form-group">
                    <label for="category">Kategorie</label>
                    <div class="cyber-toggle-group" style="grid-template-columns: repeat(2, 1fr);">
                        <input type="radio" id="dimensional-fluid-tank" name="category" value="dimensional-fluid-tank" checked>
                        <label for="dimensional-fluid-tank">Dimensional Fluid Tank</label>

                        <input type="radio" id="dimensional-chest" name="category" value="dimensional-chest">
                        <label for="dimensional-chest">Dimensional Chest</label>
                    </div>
                </div>

                <div class="form-group">
                    <label>Frequenz</label>
                    <input type="text" id="frequency" placeholder="Frequenz" autocomplete="off" required>
                </div>

                <div class="form-group">
                    <label for="content" id="content_text">Content</label>
                    <input type="text" id="content" name="content" placeholder="Content" autocomplete="off" required>
                </div>

                <div class="form-group">
                    <label for="uid">UID</label>
                    <input type="text" id="uid" name="uid" placeholder="UID" value="" disabled>
                </div>

                <button type="submit" id="loginBtn" class="btn-primary btn-submit" onclick="addEntry()">Erstellen</button>
            </div>
        </div>
    </div>
</section>

<div id="grid-container">
    <div id="grid-card-container"></div>
</div>

<!-- Footer -->
<web-footer></web-footer>

<script src="/static/js/webDashboard.js"></script>
<script src="/static/js/router.js"></script>
<script src="/static/js/dimstorage_db.js"></script>
</body>
</html>

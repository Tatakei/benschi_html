<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benschi</title>
    <link href="/static/css/webDashboard.css" rel="stylesheet">
    <link rel="icon" type="image/png" href="/static/images/benschi.png">
    <script src="/static/js/templates/web-nav.js" defer></script>
    <script src="/static/js/templates/web-hero.js" defer></script>
    <script src="/static/js/templates/web-footer.js" defer></script>
</head>
<body id="top">
<!-- Enhanced Background Elements -->
<div class="cyber-bg">
    <div class="cyber-gradient"></div>
    <div class="matrix-rain" id="matrixRain"></div>
</div>

<div class="particles" id="particlesContainer"></div>

<div class="data-streams" id="dataStreams"></div>

<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<div class="grid-overlay">
    <div class="grid-lines"></div>
    <div class="grid-glow"></div>
</div>

<div class="scanlines"></div>
<div class="noise-overlay"></div>

<!-- Navigation -->
<web-nav></web-nav>

<!-- Hero Section -->
<web-hero subtitle="Website für mein super tollen Boyfriend :3" show-buttons="true"></web-hero>

<!--
<web-hero subtitle="[Text hier rein du Flachzangenfresser]" show-buttons="true"></web-hero>
<web-hero> </web-hero>
<web-hero subtitle="[Schreib hier dein Text hier rein du Flachzange]"></web-hero>
-->

<!-- Stats Section -->
<section class="stats fade-up" id="stats">
    <div class="stats-container">
        <div class="section-header">
            <h2 class="section-title">Unsere Stats :3</h2>
        </div>
        <div class="stats-grid">
            <div class="stat-item">
                <span class="stat-number" id="days_together"></span>
                <span class="stat-label">Tage zusammen</span>
            </div>
        </div>
    </div>
</section>
<br>
<section class="stats fade-up">
    <div class="stats-container">
        <div class="section-header">
            <h2 class="section-title">Server Stats :3</h2>
        </div>
        <div class="stats-grid">
            <div class="stat-item">
                <span class="stat-number" id="days_since_server"></span>
                <span class="stat-label">Tage seit Serverkauf</span>
            </div>
            <div class="stat-item">
                <span class="stat-number">{{ total_freqs }}</span>
                <span class="stat-label">Frequenzen</span>
            </div>
            <div class="stat-item">
                <span class="stat-number">{{ total_hours }}+</span>
                <span class="stat-label">Spielstunden</span>
            </div>
        </div>
    </div>
</section>

<!-- Footer -->
<web-footer>Benschi :3</web-footer>

<script src="/static/js/webDashboard.js"></script>
<script src="/static/js/router.js"></script>
<script src="/static/js/base.js"></script>
</body>
</html>
